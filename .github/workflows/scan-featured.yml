name: Scan Featured Sites

on:
  workflow_dispatch:
    inputs:
      categories:
        description: Comma-separated category ids to scan (blank = all)
        required: false
        type: string
      limit:
        description: Max number of sites to scan (blank = all)
        required: false
        type: string
      compare_gpc:
        description: Run a GPC off/on comparison per site
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      compare_shields:
        description: Run a Shields off/on comparison per site (tried-vs-blocked; takes precedence over GPC)
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      device:
        description: Viewport
        required: true
        default: desktop
        type: choice
        options:
          - desktop
          - mobile
  repository_dispatch:
    types:
      - site-behavior-featured-scan

permissions:
  contents: write

concurrency:
  group: site-behavior-featured-scan-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "1"
  NEXT_TELEMETRY_DISABLED: "1"
  FEATURED_CATEGORIES: ${{ github.event.inputs.categories || github.event.client_payload.categories || '' }}
  FEATURED_LIMIT: ${{ github.event.inputs.limit || github.event.client_payload.limit || '' }}
  FEATURED_COMPARE_GPC: ${{ github.event.inputs.compare_gpc || github.event.client_payload.compare_gpc || 'false' }}
  FEATURED_COMPARE_SHIELDS: ${{ github.event.inputs.compare_shields || github.event.client_payload.compare_shields || 'true' }}
  FEATURED_DEVICE: ${{ github.event.inputs.device || github.event.client_payload.device || 'desktop' }}
  # Disclose that the corpus was scanned from CI (GitHub-hosted runner egress).
  # Override with a repo Actions variable named SCANNER_EGRESS if you scan elsewhere.
  SITE_BEHAVIOR_LAB_SCANNER_EGRESS: ${{ vars.SCANNER_EGRESS || 'github-actions-ubuntu' }}

jobs:
  scan-featured:
    name: Populate Featured Gallery
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build scanner app
        run: npm run build

      - name: Start scanner app
        run: |
          npm run start -- --port 3100 > /tmp/site-behavior-lab-featured.log 2>&1 &
          echo $! > /tmp/site-behavior-lab-featured.pid
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3100/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/site-behavior-lab-featured.log
          exit 1

      - name: Run featured scans
        run: npm run scan:featured
        env:
          BASE_URL: http://127.0.0.1:3100

      - name: Prune retained static reports
        run: npm run reports:prune

      - name: Build static report manifest
        run: npm run reports:manifest

      - name: Build corpus stats
        run: npm run corpus:stats

      - name: Summarize corpus
        run: |
          REPORTS=$(jq '.reports | length' public/reports/index.json 2>/dev/null || echo 0)
          SAMPLE=$(jq '.sampleSize' public/corpus-stats.json 2>/dev/null || echo 0)
          {
            echo "## Featured scan corpus"
            echo ""
            echo "- Listed reports in manifest: **$REPORTS**"
            echo "- Distinct sites in corpus (sampleSize): **$SAMPLE**"
            echo "- Corpus-relative percentile findings activate at 50 distinct sites (CORPUS_MIN_SAMPLE)."
            echo "- Branch \`${GITHUB_REF_NAME}\`: reports were committed here. Review the Cloudflare Pages preview for this branch, then merge to the production branch to publish."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site-behavior-featured-reports
          path: |
            public/reports
            public/corpus-stats.json

      - name: Commit static reports
        run: |
          git config user.name "iAnonymous3000"
          git config user.email "32236127+iAnonymous3000@users.noreply.github.com"
          git add public/reports public/corpus-stats.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "Add featured site behavior scan reports"
          git push
